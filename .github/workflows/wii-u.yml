name: Build Wii U WUHB

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitppc:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Wii U Dependencies
        run: |
          sudo dkp-pacman -S --noconfirm wiiu-dev

      - name: Run Build Script
        run: |
          chmod +x build-wiiu.sh
          sed -i 's/\r$//' build-wiiu.sh
          ./build-wiiu.sh

      - name: Upload WUHB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: wiiu-build-output
          path: output-wiiu/

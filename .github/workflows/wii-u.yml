name: Build Wii U WUHB
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitppc:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install Wii U Dependencies
        run: |
          sudo dkp-pacman -S --noconfirm wiiu-dev
      - name: Run Build
        run: |
          export DEVKITPRO=/opt/devkitpro
          export DEVKITPPC=$DEVKITPRO/devkitPPC
          export PATH=$DEVKITPRO/tools/bin:$DEVKITPPC/bin:/usr/bin:$PATH
          mkdir -p output-wiiu
          echo "--- Starting Build ---"
          make -f Makefile.wiiu --no-print-directory
          if [ -f "deltarune.wuhb" ]; then
            mv deltarune.wuhb output-wiiu/deltarune.wuhb
          elif [ -f "undertale.wuhb" ]; then
            mv undertale.wuhb output-wiiu/deltarune.wuhb
          fi
      - name: Upload WUHB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: deltarune-wuhb
          path: |
            *.wuhb
            output-wiiu/*.wuhb

name: Build Wii U WUHB
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitppc:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install Wii U Dependencies
        run: |
          sudo dkp-pacman -S --noconfirm wiiu-dev
      - name: Run Build
        run: |
          export DEVKITPRO=/opt/devkitpro
          export DEVKITPPC=$DEVKITPRO/devkitPPC
          export PATH=$DEVKITPRO/tools/bin:$DEVKITPPC/bin:/usr/bin:$PATH
          mkdir -p build output-wiiu
          echo "--- Compiling ---"
          make -f Makefile.wiiu --no-print-directory
          echo "--- Converting to RPX ---"
          ELF_FILE=$(find build -name "*.elf" | head -n 1)
          RPX_FILE="${ELF_FILE%.elf}.rpx"
          elf2rpl "$ELF_FILE" "$RPX_FILE"
          echo "--- Packaging WUHB ---"
          if [ -f "undertale.wuhb" ]; then
            mv undertale.wuhb output-wiiu/deltarune.wuhb
          fi
          wuhbtool "output-wiiu/deltarune.wuhb" "$RPX_FILE" \
            --name "Deltarune" \
            --short-name "deltarune" \
            --author "Grayforz2468" \
            --icon "resources/wiiu/icon.png"
      - name: Upload WUHB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: deltarune-wuhb
          path: |
            *.wuhb
            output-wiiu/*.wuhb

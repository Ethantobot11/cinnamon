name: Build Wii U WUHB

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitppc:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Wii U Dependencies
        run: |
          sudo dkp-pacman -S --noconfirm wiiu-dev

      - name: Run Build Script
        run: |
          sed -i 's/\r$//' build-wiiu.sh
          chmod +x build-wiiu.sh
          export DEVKITPRO=/opt/devkitpro
          export DEVKITPPC=/opt/devkitpro/devkitPPC
          export PATH=$DEVKITPRO/tools/bin:$DEVKITPPC/bin:/usr/bin:$PATH
          ./build-wiiu.sh
        env:
          DEVKITPRO: /opt/devkitpro
          DEVKITPPC: /opt/devkitpro/devkitPPC

      - name: Upload WUHB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: wiiu-build-output
          path: output-wiiu/
